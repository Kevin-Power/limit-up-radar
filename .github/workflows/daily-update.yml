name: Daily Update - Fetch TWSE Data

on:
  schedule:
    # Weekdays at 14:35 Taiwan time (UTC+8) = 06:35 UTC
    - cron: '35 6 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: 'Trading date (YYYY-MM-DD), leave empty for auto-detect'
        required: false
        default: ''

env:
  TZ: Asia/Taipei

permissions:
  contents: write

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests

      - name: Run classify script
        id: classify
        run: |
          set +e
          if [ -n "${{ github.event.inputs.date }}" ]; then
            PYTHONPATH=. python scripts/classify_and_save.py "${{ github.event.inputs.date }}" 2>&1
          else
            PYTHONPATH=. python scripts/classify_and_save.py 2>&1
          fi
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -eq 2 ]; then
            echo "::error::Data validation failed - corrupt data detected, aborting"
            echo "data_found=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Script exited with code $EXIT_CODE"
            echo "data_found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No trading data found (market may be closed today)"
            exit 0
          fi

          # Check if any JSON file was created in data/daily/
          LATEST_JSON=$(ls -t data/daily/*.json 2>/dev/null | head -1)
          if [ -z "$LATEST_JSON" ]; then
            echo "data_found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No JSON file was created"
          else
            echo "data_found=true" >> "$GITHUB_OUTPUT"
            echo "json_file=$LATEST_JSON" >> "$GITHUB_OUTPUT"
            echo "Data file created: $LATEST_JSON"
          fi

      - name: Validate latest data file
        if: steps.classify.outputs.data_found == 'true'
        run: |
          DATE_PART=$(basename "${{ steps.classify.outputs.json_file }}" .json)
          python scripts/validate_data.py "$DATE_PART"

      - name: Run real backtest (fetches TWSE next-day OHLC)
        if: steps.classify.outputs.data_found == 'true'
        continue-on-error: true
        run: |
          python scripts/run_backtest.py

      - name: Commit and push data
        if: steps.classify.outputs.data_found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily/*.json data/backtest.json
          DATE_PART=$(basename "${{ steps.classify.outputs.json_file }}" .json)
          git commit -m "data: add daily data for ${DATE_PART}" || echo "No changes to commit"
          git push

      - name: Deploy to Vercel
        if: steps.classify.outputs.data_found == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel --silent
          vercel --prod --token="$VERCEL_TOKEN" --yes

      - name: Summary
        run: |
          if [ "${{ steps.classify.outputs.data_found }}" == "true" ]; then
            echo "### Daily Update Complete" >> $GITHUB_STEP_SUMMARY
            echo "- Data file: \`${{ steps.classify.outputs.json_file }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- Deployed to Vercel production" >> $GITHUB_STEP_SUMMARY
          else
            echo "### No Update Today" >> $GITHUB_STEP_SUMMARY
            echo "- No trading data found (holiday or weekend)" >> $GITHUB_STEP_SUMMARY
          fi
