<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="chartGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="bgGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161B22"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGlow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(100,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(200,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(300,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(400,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(500,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(600,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(700,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(800,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(900,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(1000,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(1100,0)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,100)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,200)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,300)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,400)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,500)" />
  </g>

  <!-- Top red accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="#EF4444"/>
  <rect x="0" y="0" width="400" height="4" fill="#F97316" opacity="0.6"/>

  <!-- Left Section -->
  <g transform="translate(80, 160)">
    <!-- Logo: red dot + title -->
    <circle cx="24" cy="-48" r="12" fill="#EF4444" filter="url(#glow)"/>
    <circle cx="24" cy="-48" r="6" fill="#FF6B6B"/>
    <text x="50" y="-36" font-family="Microsoft JhengHei, sans-serif" font-size="22" fill="#8B949E" font-weight="400" letter-spacing="4">LIMIT-UP RADAR</text>

    <!-- Main title -->
    <text x="0" y="30" font-family="Microsoft JhengHei, sans-serif" font-size="64" fill="#FFFFFF" font-weight="700">漲停雷達</text>

    <!-- Terminal cursor blink effect -->
    <rect x="280" y="2" width="4" height="40" fill="#EF4444" opacity="0.8"/>

    <!-- Subtitle -->
    <text x="0" y="90" font-family="Microsoft JhengHei, sans-serif" font-size="24" fill="#8B949E" font-weight="400">AI 驅動的台股漲停族群分類平台</text>

    <!-- Feature tags -->
    <g transform="translate(0, 140)">
      <rect x="0" y="0" width="120" height="36" rx="18" fill="#EF4444" fill-opacity="0.15" stroke="#EF4444" stroke-opacity="0.3" stroke-width="1"/>
      <text x="60" y="23" font-family="Microsoft JhengHei, sans-serif" font-size="14" fill="#EF4444" text-anchor="middle">即時分析</text>

      <rect x="135" y="0" width="120" height="36" rx="18" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-opacity="0.3" stroke-width="1"/>
      <text x="195" y="23" font-family="Microsoft JhengHei, sans-serif" font-size="14" fill="#3B82F6" text-anchor="middle">族群分類</text>

      <rect x="270" y="0" width="120" height="36" rx="18" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-opacity="0.3" stroke-width="1"/>
      <text x="330" y="23" font-family="Microsoft JhengHei, sans-serif" font-size="14" fill="#10B981" text-anchor="middle">趨勢追蹤</text>
    </g>
  </g>

  <!-- Right Section: Mock Dashboard -->
  <g transform="translate(660, 80)">
    <!-- Dashboard card -->
    <rect x="0" y="0" width="460" height="440" rx="16" fill="url(#cardBg)" stroke="#21262D" stroke-width="1.5"/>

    <!-- Card header bar -->
    <rect x="0" y="0" width="460" height="48" rx="16" fill="#161B22"/>
    <rect x="0" y="32" width="460" height="16" fill="#161B22"/>
    <!-- Window dots -->
    <circle cx="24" cy="24" r="6" fill="#EF4444" opacity="0.8"/>
    <circle cx="44" cy="24" r="6" fill="#F59E0B" opacity="0.8"/>
    <circle cx="64" cy="24" r="6" fill="#10B981" opacity="0.8"/>
    <text x="230" y="29" font-family="Microsoft JhengHei, sans-serif" font-size="13" fill="#8B949E" text-anchor="middle">Dashboard — 2026/03/23</text>

    <!-- Stats row -->
    <g transform="translate(24, 72)">
      <!-- Stat 1 -->
      <rect x="0" y="0" width="130" height="70" rx="10" fill="#EF4444" fill-opacity="0.08" stroke="#EF4444" stroke-opacity="0.2" stroke-width="1"/>
      <text x="65" y="30" font-family="Microsoft JhengHei, sans-serif" font-size="28" fill="#EF4444" font-weight="700" text-anchor="middle">54</text>
      <text x="65" y="52" font-family="Microsoft JhengHei, sans-serif" font-size="13" fill="#8B949E" text-anchor="middle">漲停家數</text>

      <!-- Stat 2 -->
      <rect x="145" y="0" width="130" height="70" rx="10" fill="#3B82F6" fill-opacity="0.08" stroke="#3B82F6" stroke-opacity="0.2" stroke-width="1"/>
      <text x="210" y="30" font-family="Microsoft JhengHei, sans-serif" font-size="28" fill="#3B82F6" font-weight="700" text-anchor="middle">10</text>
      <text x="210" y="52" font-family="Microsoft JhengHei, sans-serif" font-size="13" fill="#8B949E" text-anchor="middle">族群數量</text>

      <!-- Stat 3 -->
      <rect x="290" y="0" width="122" height="70" rx="10" fill="#10B981" fill-opacity="0.08" stroke="#10B981" stroke-opacity="0.2" stroke-width="1"/>
      <text x="351" y="30" font-family="Microsoft JhengHei, sans-serif" font-size="28" fill="#10B981" font-weight="700" text-anchor="middle">87%</text>
      <text x="351" y="52" font-family="Microsoft JhengHei, sans-serif" font-size="13" fill="#8B949E" text-anchor="middle">分類準確</text>
    </g>

    <!-- Chart area -->
    <g transform="translate(24, 168)">
      <text x="0" y="14" font-family="Microsoft JhengHei, sans-serif" font-size="13" fill="#8B949E">漲停趨勢</text>

      <!-- Chart background lines -->
      <line x1="0" y1="40" x2="412" y2="40" stroke="#21262D" stroke-width="1"/>
      <line x1="0" y1="70" x2="412" y2="70" stroke="#21262D" stroke-width="1"/>
      <line x1="0" y1="100" x2="412" y2="100" stroke="#21262D" stroke-width="1"/>
      <line x1="0" y1="130" x2="412" y2="130" stroke="#21262D" stroke-width="1"/>

      <!-- Chart area fill -->
      <polygon points="0,130 30,115 60,120 90,100 120,105 150,85 180,90 210,70 240,60 270,55 300,40 330,45 360,35 390,30 412,25 412,130" fill="#EF4444" fill-opacity="0.06"/>

      <!-- Chart line -->
      <polyline points="0,130 30,115 60,120 90,100 120,105 150,85 180,90 210,70 240,60 270,55 300,40 330,45 360,35 390,30 412,25" fill="none" stroke="url(#chartGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Data points -->
      <circle cx="300" cy="40" r="4" fill="#EF4444" filter="url(#glow)"/>
      <circle cx="360" cy="35" r="4" fill="#EF4444" filter="url(#glow)"/>
      <circle cx="412" cy="25" r="5" fill="#EF4444" filter="url(#glow)"/>
      <circle cx="412" cy="25" r="2.5" fill="#fff"/>
    </g>

    <!-- Group bars -->
    <g transform="translate(24, 326)">
      <text x="0" y="14" font-family="Microsoft JhengHei, sans-serif" font-size="13" fill="#8B949E">熱門族群</text>

      <!-- Bar 1 -->
      <rect x="0" y="28" width="260" height="22" rx="4" fill="#EF4444" fill-opacity="0.2"/>
      <rect x="0" y="28" width="260" height="22" rx="4" fill="#EF4444" fill-opacity="0.6"/>
      <text x="8" y="43" font-family="Microsoft JhengHei, sans-serif" font-size="12" fill="#FFFFFF">AI / 半導體</text>
      <text x="250" y="43" font-family="Microsoft JhengHei, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="end">12</text>

      <!-- Bar 2 -->
      <rect x="0" y="56" width="190" height="22" rx="4" fill="#3B82F6" fill-opacity="0.5"/>
      <text x="8" y="71" font-family="Microsoft JhengHei, sans-serif" font-size="12" fill="#FFFFFF">綠能 / 儲能</text>
      <text x="180" y="71" font-family="Microsoft JhengHei, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="end">8</text>

      <!-- Bar 3 -->
      <rect x="0" y="84" width="140" height="22" rx="4" fill="#10B981" fill-opacity="0.5"/>
      <text x="8" y="99" font-family="Microsoft JhengHei, sans-serif" font-size="12" fill="#FFFFFF">生技醫療</text>
      <text x="130" y="99" font-family="Microsoft JhengHei, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="end">6</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0D1117"/>
  <line x1="0" y1="590" x2="1200" y2="590" stroke="#21262D" stroke-width="1"/>

  <!-- URL -->
  <text x="600" y="616" font-family="Consolas, monospace" font-size="16" fill="#22D3EE" text-anchor="middle" letter-spacing="1.5" filter="url(#softGlow)">limit-up-radar.vercel.app</text>

  <!-- Decorative corner accents -->
  <line x1="40" y1="590" x2="40" y2="570" stroke="#EF4444" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="590" x2="60" y2="590" stroke="#EF4444" stroke-width="1" opacity="0.3"/>
  <line x1="1160" y1="590" x2="1160" y2="570" stroke="#EF4444" stroke-width="1" opacity="0.3"/>
  <line x1="1160" y1="590" x2="1140" y2="590" stroke="#EF4444" stroke-width="1" opacity="0.3"/>
</svg>